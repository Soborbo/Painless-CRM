name = "painless-crm"
main = ".open-next/worker.js"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[vars]
NEXT_PUBLIC_APP_URL = "https://crm.painlessremovals.com"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Provision via: wrangler kv namespace create PRICING_KV
[[kv_namespaces]]
binding = "PRICING_KV"
id = "c486a7082d2643ab8891c9500e4fbf18"
preview_id = "b96030e095fc496e93958b6a7f0c95d0"

[[kv_namespaces]]
binding = "AVAILABILITY_KV"
id = "d41c64b23c394381b7717fe3fbe6b2b6"
preview_id = "1d039bb1999c44e3a34f7f4acf6625a3"

# Rate-limit counters (export caps, webhook overflow — SECURITY_MODEL Gate 5 / T4).
# Provision via: wrangler kv namespace create RATE_LIMIT_KV
# The helper degrades open when this binding is absent, so dev is unaffected.
[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "REPLACE_WITH_RATE_LIMIT_KV_ID"
preview_id = "REPLACE_WITH_RATE_LIMIT_KV_PREVIEW_ID"

# Secrets — set via: wrangler secret put NAME
# SUPABASE_SERVICE_ROLE_KEY
# RESEND_API_KEY
# SENTRY_AUTH_TOKEN
# CRM_WEBHOOK_SECRET (HMAC for inbound from painlessremovals.com + cron triggers)
# ANTHROPIC_API_KEY

# Cloudflare Cron Triggers. Each expression fires the Worker's scheduled()
# handler, which signs the matching /api/cron/* payload with CRM_WEBHOOK_SECRET
# and POSTs it (see worker.ts + src/worker-cron/schedule.ts — keep the crontab
# expressions in lockstep with CRON_SCHEDULE there).
#
# ACTIVATION: the scheduled handler lives in worker.ts, which is NOT yet the
# Worker entry. Until `main` points at worker.ts (after `opennextjs-cloudflare
# migrate` initialises the build — run from WSL/CI, not native Windows), these
# triggers fire on the generated worker, which has no scheduled handler (no-op).
[triggers]
crons = [
  "0 1 * * *",     # recompute-availability — nightly
  "0 2 * * *",     # expire-quotes — daily
  "0 6 * * *",     # vehicle-compliance — daily 06:00
  "30 6 * * *",    # complaint-sla — daily, escalate >7d open complaints
  "45 6 * * *",    # invoice-dunning — daily, overdue reminders T+3/7/14 + T+30 escalation
  "0 9 * * *",     # sla-digest — daily 09:00 overdue-lead digest
  "15 * * * *",    # review-requests — hourly (send +24h after paid, follow up +7d/+14d)
  "* * * * *",     # automation-queue — every minute, runs due automation actions
  "*/30 * * * *",  # stale-clock-in — every 30 min
  "0 7 * * 1",     # weekly-digest — Monday 07:00, weekly performance summary email
]

[env.preview]
name = "painless-crm-preview"

[env.production]
name = "painless-crm"
routes = [
  { pattern = "crm.painlessremovals.com", custom_domain = true }
]
